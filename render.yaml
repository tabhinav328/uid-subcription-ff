databases:
  - name: uid-subscriptions-db
    plan: free
    databaseName: uid_subscriptions
    user: uid_subscriptions

services:
  - type: web
    name: uid-subcription-ff
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: uid-subscriptions-db
          property: connectionString
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.9"